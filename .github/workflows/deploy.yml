name: Deploy a Hostinger

# Despliega el sitio estatico a Hostinger por FTP en cada push a main.
# Requiere 3 secrets en el repo de GitHub (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    -> host FTP de Hostinger (ej. ftp.picandotabla.com  o  82.180.xxx.xxx)
#   FTP_USERNAME  -> usuario FTP (lo creas en hPanel -> Archivos -> Cuentas FTP)
#   FTP_PASSWORD  -> contrasena de esa cuenta FTP
# Ajusta server-dir si tu dominio es addon: domains/picandotabla.com/public_html/

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir por FTP a Hostinger
        # se salta (workflow en verde) mientras no existan los secrets FTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
